# Enable split keyboard support for passing indicator state to peripherals	
CONFIG_ZMK_HID_INDICATORS=y
CONFIG_ZMK_SPLIT_PERIPHERAL_HID_INDICATORS=y

# Report the battery level less often. The percentage changes very slowly, so a
# longer interval reduces how often a load-induced voltage dip is sampled, which
# makes the displayed value steadier. (Display smoothing is done in the widgets.)
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=120


CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y
